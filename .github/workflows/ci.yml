name: TourSafe CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Backend Testing
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    - run: cd backend && npm install && npm test || true # Allow failure for now as we haven't written tests

  # AI Service Testing
  ai-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: |
        cd ai-service
        pip install -r requirements.txt
        python -m pytest || true # Allow failure for now

  # Docker Build Check
  docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Check Environment
      run: |
        docker --version
        docker compose version
    - name: Build the Docker images
      run: docker compose build
